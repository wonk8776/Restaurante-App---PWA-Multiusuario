<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTIQ — Mesero</title>
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0F2D5E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RESTIQ">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">

    <style>
        :root {
            --color-bg: #0f172a;
            --color-surface: #1e293b;
            --color-card: #1e293b;
            --color-card-alt: #162032;
            --color-sidebar: #0c1a2e;
            --color-primary: #D4AF37;
            --color-primary-light: rgba(212,175,55,0.12);
            --color-primary-hover: #c9a227;
            --color-accent: #D4AF37;
            --color-green: #22c55e;
            --color-green-light: rgba(34,197,94,0.12);
            --color-green-action: #22c55e;
            --color-green-action-hover: #16a34a;
            --color-red: #ef4444;
            --color-red-light: rgba(239,68,68,0.12);
            --color-warning: #f59e0b;
            --color-warning-light: rgba(245,158,11,0.12);
            --color-text: #f1f5f9;
            --color-text-muted: #94a3b8;
            --color-text-dim: #64748b;
            --color-border: rgba(255,255,255,0.08);
            --color-border-focus: #D4AF37;
            --color-input-bg: rgba(255,255,255,0.04);
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            --font-heading: 'DM Serif Display', serif;
            --font-body: 'Inter', sans-serif;
            --color-error: var(--color-red);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: var(--radius-pill);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-primary);
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            padding-bottom: 2rem;
        }

        /* Header mesero */
        header {
            background: var(--color-sidebar) !important;
            min-height: 56px;
            padding: 0 20px !important;
            border-bottom: none !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .restiq-logo, header .logo {
            font-size: 15px;
            font-weight: 700;
            color: #FFFFFF !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        header .waiter-name {
            font-size: 13px;
            color: rgba(255,255,255,0.7) !important;
        }
        header .waiter-name strong { color: #FFFFFF !important; }
        header .btn-logout {
            font-size: 12px;
            color: rgba(255,255,255,0.5) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 6px;
            padding: 6px 12px !important;
            background: transparent !important;
        }
        header .btn-logout:hover {
            color: #FFFFFF !important;
            border-color: rgba(255,255,255,0.5) !important;
        }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        /* Escritorio: logo-block en columna (logo arriba, restaurante abajo) */
        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            flex-shrink: 0;
        }
        #meseroRestaurantName {
            font-size: 12px;
            margin-left: 36px;
        }
        main {
            background: var(--color-bg);
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        main h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 12px;
        }
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
        }
        .table-btn {
            height: 56px;
            min-height: 56px;
            background: var(--color-card);
            border: 1.5px solid var(--color-border);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text);
            cursor: pointer;
            transition: all 150ms ease;
            position: relative;
        }
        .table-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            color: var(--color-primary);
        }
        .table-btn.has-order {
            border-color: var(--color-green);
            background: var(--color-green-light);
            color: var(--color-green);
        }
        .table-btn.selected, .table-btn.active {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
        }

        .table-btn.mesa-propia {
            border-color: var(--color-green) !important;
            background: var(--color-green-light) !important;
            color: var(--color-green) !important;
        }
        .table-btn.mesa-propia::after {
            content: ' ●';
            font-size: 0.55rem;
            vertical-align: super;
            color: var(--color-green);
        }
        .table-btn.mesa-ocupada-otro {
            border-color: var(--color-primary) !important;
            background: var(--color-primary-light) !important;
            color: var(--color-primary) !important;
        }
        .table-btn.mesa-ocupada-otro::after {
            content: ' ●';
            font-size: 0.55rem;
            vertical-align: super;
            color: var(--color-primary);
        }

        /* Modal: estilos globales en estilos.css (glassmorphism, slide-up, cierre minimalista). Solo ajustes responsive aquí. */
        .modal-overlay.open {
            display: flex;
        }

        @media (max-width: 768px) {
            .modal-overlay {
                padding: 0;
                align-items: stretch;
                justify-content: stretch;
            }

            .modal,
            .modal-content {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                border-radius: 0;
                border: none;
                border-left: none;
                border-right: none;
                display: flex;
                flex-direction: column;
            }

            .modal-header {
                flex-shrink: 0;
                padding: 1rem 1.25rem;
            }

            .modal-title {
                font-size: 1.25rem;
            }

            .modal-close {
                font-size: 1.5rem;
                min-width: 44px;
                min-height: 44px;
                padding: 0.5rem;
            }

            .modal-body {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 1rem 1.25rem;
                display: flex;
                flex-direction: column;
            }

            .order-summary {
                display: flex;
                flex-direction: column;
                margin-top: auto;
                padding-bottom: 64px;
            }

            .btn-send {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                min-height: 52px;
                margin: 0;
                border-radius: 0;
                z-index: 1100;
            }

            .btn-add {
                width: 44px;
                height: 44px;
                min-width: 44px;
                min-height: 44px;
            }

            .tables-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.75rem;
            }

            .table-btn {
                min-height: 60px;
                text-align: center;
            }
        }

        /* Modal: header/close/body heredan de estilos.css (suite de lujo). Sin overrides visuales. */
        .menu-section h3 {
            font-size: 0.75rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            border-bottom: 2px solid var(--color-border);
            padding-bottom: 0.5rem;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            min-height: 60px;
            transition: all 0.2s;
        }

        .menu-item:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            box-shadow: var(--shadow-xs);
        }

        .menu-item-info {
            flex: 1;
            min-width: 0;
        }

        .menu-item-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--color-text);
        }

        .menu-item-price {
            font-size: 0.85rem;
            color: var(--color-green-action);
            font-weight: 700;
        }

        .btn-add {
            width: 44px;
            height: 44px;
            min-width: 44px;
            min-height: 44px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #0f172a;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.3s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(212,175,55,0.3);
        }

        .btn-add:hover {
            background: var(--color-primary-hover);
            transform: scale(1.08);
        }

        /* Resumen pedido */
        .order-summary {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        .order-summary h3 {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
        }

        .order-items {
            max-height: none;
            overflow-y: visible;
            margin-bottom: 0.75rem;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            font-size: 0.9rem;
        }

        .order-item-qty {
            color: var(--color-primary);
            font-weight: 700;
            min-width: 2rem;
        }

        .order-total {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-primary);
            display: flex;
            justify-content: space-between;
            padding-top: 0.5rem;
        }

        .empty-order {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            font-style: italic;
            padding: 0.5rem 0;
        }

        .btn-send {
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(212,175,55,0.3);
            transition: all 0.15s ease;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-send:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 4px 16px rgba(212,175,55,0.4);
            transform: translateY(-1px);
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Toast confirmación */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-surface);
            color: var(--color-text);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            z-index: 300;
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Mis órdenes */
        .my-orders-section {
            margin-top: 2.5rem;
        }

        .my-orders-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .order-card {
            background: var(--color-card);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            padding: 16px;
            margin-bottom: 12px;
        }

        .order-card:hover {
            border-color: var(--color-border);
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-card-mesa {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-primary);
        }

        .order-card-total {
            font-size: 1rem;
            font-weight: 700;
            color: var(--color-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            margin-top: 0.5rem;
            border-top: 1px solid var(--color-border);
        }

        .order-card-estado {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .order-card-platillos {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin-bottom: 0.5rem;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .estado-pendiente { background: var(--color-warning-light); color: var(--color-warning); border-radius: var(--radius-pill); border: 1px solid rgba(245,127,23,0.3); }
        .estado-preparacion { background: var(--color-primary-light); color: var(--color-primary); border-radius: var(--radius-pill); border: 1px solid rgba(212,175,55,0.3); }
        .estado-listo { background: var(--color-green-light); color: var(--color-green); border-radius: var(--radius-pill); border: 1px solid rgba(46,125,50,0.3); }
        .estado-entregado { background: var(--color-green-light); color: var(--color-green-action); border-radius: var(--radius-pill); border: 1px solid rgba(56,142,60,0.4); }

        .my-orders-empty {
            color: var(--color-text-muted);
            font-style: italic;
            padding: 1rem 0;
        }

        /* Header móvil: logo+restaurante apilados a la izquierda, mesero+logout a la derecha */
        @media (max-width: 768px) {
            header {
                flex-wrap: nowrap;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 0 1rem;
                height: auto;
                min-height: 56px;
                gap: 0.5rem;
            }

            .logo-block {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 1px;
                flex-shrink: 0;
                min-width: 0;
            }

            .restiq-logo {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 6px;
                font-size: 13px;
                font-weight: 700;
            }

            #meseroRestaurantName {
                position: static;
                transform: none;
                pointer-events: auto;
                font-size: 11px;
                color: var(--color-primary) !important;
                display: block !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 150px;
                margin-left: 34px;
                margin-top: 1px;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                flex-shrink: 0;
            }

            .waiter-name {
                font-size: 12px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 90px;
                color: rgba(255,255,255,0.8) !important;
            }

            .btn-logout {
                font-size: 11px;
                padding: 6px 10px !important;
                white-space: nowrap;
                flex-shrink: 0;
                min-height: 36px;
                position: static;
                transform: none;
            }

            .tables-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.75rem;
            }

            .btn-logout,
            .btn-send,
            .btn-add,
            .modal-close,
            .table-btn {
                -webkit-tap-highlight-color: transparent;
            }
            .btn-logout:active,
            .btn-send:active,
            .btn-add:active,
            .modal-close:active,
            .table-btn:active {
                opacity: 0.7;
                transform: scale(0.98);
            }
        }

        /* Botones WhatsApp e Imprimir en mis órdenes */
        .order-card-actions {
            display: none;
        }
        .btn-whatsapp-mesero {
            padding: 8px 14px;
            font-size: 0.8rem;
            min-height: 44px;
            background: rgba(37, 211, 102, 0.2);
            color: #25d366;
            border: 1px solid #25d366;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            margin-left: auto;
            flex-shrink: 0;
        }
        .btn-whatsapp-mesero:hover {
            background: rgba(37, 211, 102, 0.35);
            color: #20bd5a;
        }
        .btn-print-mesero {
            padding: 8px 14px;
            font-size: 0.8rem;
            min-height: 44px;
            background: var(--color-card);
            color: var(--color-primary);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .btn-print-mesero:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        #ticket-container { display: none; }

        /* Impresión térmica 80mm: ticket con branding FAMILIA GONZÁLEZ, líneas punteadas. Desactive "Encabezados y pie" en el diálogo de impresión. */
        @media print {
            body > *:not(#ticket-container) { display: none !important; visibility: hidden !important; }
            #ticket-container {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 80mm !important;
                min-width: 80mm !important;
                max-width: 80mm !important;
                margin: 0 !important;
                padding: 4mm !important;
                background: #fff !important;
                color: #000 !important;
                font-family: Arial, sans-serif !important;
                font-size: 10px !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            #ticket-container .ticket-paper { background: #fff !important; color: #000 !important; }
            #ticket-container .ticket-logo,
            #ticket-container .ticket-nombre {
                font-family: Georgia, 'Times New Roman', serif !important;
                font-size: 12px !important;
                font-weight: 600 !important;
                letter-spacing: 0.35em !important;
                text-align: center !important;
                margin: 0 0 6px !important;
                color: #000 !important;
                text-transform: uppercase !important;
            }
            #ticket-container .ticket-fecha,
            #ticket-container .ticket-detalles { text-align: center !important; margin: 4px 0 !important; font-size: 9px !important; color: #000 !important; }
            #ticket-container .ticket-tabla { width: 100% !important; border-collapse: collapse !important; margin: 6px 0 !important; font-size: 9px !important; }
            #ticket-container .ticket-tabla th,
            #ticket-container .ticket-tabla td { border: none !important; border-bottom: 1px dashed #000 !important; padding: 2px 4px !important; color: #000 !important; text-align: left !important; }
            #ticket-container .ticket-total { font-weight: 700 !important; font-size: 12px !important; margin: 8px 0 4px !important; color: #000 !important; }
            #ticket-container .ticket-gracias { text-align: center !important; font-size: 9px !important; margin: 8px 0 2px !important; color: #000 !important; font-style: italic !important; }
            #ticket-container .ticket-qr-placeholder { text-align: center !important; font-size: 8px !important; color: #666 !important; margin-top: 6px !important; padding: 4px 0 !important; border-top: 1px dashed #000 !important; }
            @page { size: 80mm auto; margin: 0; }
            body { background: #fff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .btn-agregar-mas {
            padding: 8px 14px;
            font-size: 0.8rem;
            min-height: 44px;
            background: rgba(212, 175, 55, 0.15);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-agregar-mas:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        .orden-platillo-fila {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.88rem;
        }
        .orden-platillo-fila:last-child {
            border-bottom: none;
        }
        .orden-platillo-linea1 {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }
        .orden-platillo-nombre {
            flex: 1;
            min-width: 0;
            color: var(--color-text);
            word-break: break-word;
        }
        .orden-platillo-qty {
            flex-shrink: 0;
            white-space: nowrap;
            color: var(--color-primary);
            font-weight: 700;
            min-width: 28px;
            text-align: center;
        }
        .orden-platillo-linea2 {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            width: 100%;
        }
        .orden-platillo-precio {
            flex-shrink: 0;
            white-space: nowrap;
            color: var(--color-text-muted);
            font-size: 0.8rem;
            min-width: 54px;
            text-align: right;
        }
        .btn-qty {
            flex-shrink: 0;
            white-space: nowrap;
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-qty.btn-qty-mas {
            background: var(--color-primary);
            color: #0f172a;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-qty.btn-qty-mas:hover {
            background: var(--color-primary-hover);
        }
        .btn-qty.btn-qty-mas:active {
            transform: scale(0.95);
        }
        .btn-qty.btn-qty-menos {
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            transition: all 0.2s;
        }
        .btn-qty.btn-qty-menos:hover {
            background: var(--color-primary-light);
        }
        .btn-eliminar-platillo {
            flex-shrink: 0;
            white-space: nowrap;
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 50%;
            border: 1.5px solid rgba(239,68,68,0.3);
            background: var(--color-red-light);
            color: var(--color-red);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-eliminar-platillo:hover {
            background: var(--color-red);
            color: var(--color-text);
        }

        .orders-filter {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .orders-filter label {
            color: var(--color-text);
            font-weight: 700;
            font-size: 0.85rem;
        }
        .orders-filter input[type="date"] {
            padding: 8px 12px;
            background: var(--color-input-bg);
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text);
            font-size: 0.9rem;
            min-height: 44px;
            box-shadow: var(--shadow-xs);
        }
        .orders-filter input[type="date"]:focus {
            outline: none;
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
        }
        .ordenes-count {
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        .toast-add {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--color-primary);
            color: #0f172a;
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(212,175,55,0.4);
            max-width: 90vw;
            text-align: center;
        }
        .toast-add.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width: 768px) {
            .menu-cards-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 0.75rem !important;
            }
            .product-card-image-wrap,
            .product-card-placeholder {
                height: 80px !important;
            }
            .product-card-name {
                font-size: 0.8rem !important;
            }
            .product-card-meta {
                font-size: 0.7rem !important;
            }
            .product-card-price {
                font-size: 0.85rem !important;
            }
        }
        .btn-agregar-mas {
            margin-left: 1rem !important;
        }

        /* Notificación de orden lista en mesa */
        .mesa-lista {
            border-color: #10b981 !important;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.6) !important;
            animation: pulso-listo 1.5s ease-in-out 3;
        }

        @keyframes pulso-listo {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .mesa-lista-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            pointer-events: none;
        }

        .mesero-restaurant-name {
            font-size: 13px;
            color: #D4AF37;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-left: 8px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-block">
            <span class="restiq-logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="28" height="28" rx="7" fill="#2563EB"/>
                    <path d="M7 8h8.5a3.5 3.5 0 0 1 0 7H7V8z" fill="white"/>
                    <path d="M7 15h5l5 5H7v-5z" fill="white" opacity="0.7"/>
                    <rect x="18" y="15" width="3" height="5" rx="1.5" fill="white" opacity="0.9"/>
                </svg>
                <span>RESTIQ</span>
            </span>
            <div id="meseroRestaurantName" class="mesero-restaurant-name"></div>
        </div>
        <div class="header-right">
            <span class="waiter-name">Mesero: <strong id="waiterName">---</strong></span>
            <button type="button" class="btn-logout" id="btnLogout">Cerrar sesión</button>
        </div>
    </header>

    <main>
        <h2>Seleccione una mesa</h2>
        <div class="tables-grid" id="tablesGrid"></div>

        <section class="my-orders-section">
            <h2>Mis órdenes</h2>
            <div class="orders-filter">
                <label for="filtroFechaOrdenes">Fecha:</label>
                <input type="date" id="filtroFechaOrdenes">
                <span id="ordenesFechaCount" class="ordenes-count"></span>
            </div>
            <div class="my-orders-list" id="myOrdersList">
                <p class="my-orders-empty">Cargando...</p>
            </div>
        </section>
    </main>

    <!-- Modal pedido -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Mesa 1</h3>
                <button type="button" class="modal-close" id="modalClose" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body">
                <div class="menu-section">
                    <h3>Menú</h3>
                    <div class="menu-filter-pills" id="menuModalFilterPills"></div>
                    <div id="menuListEmptyState" class="empty-state" style="display:none;">
                        <div class="empty-state-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.87c1.355 0 2.697.055 4.024.165C17.155 8.51 18 9.473 18 10.608v2.513m-3-4.87v-1.5m-6 1.5v-1.5m12 9l-2.25 6a2.25 2.25 0 01-2.25 1.5H6.75a2.25 2.25 0 01-2.25-1.5L2.25 12m18 0v-6a2.25 2.25 0 00-2.25-2.25H6A2.25 2.25 0 003.75 6v6m18 0V9a2.25 2.25 0 00-2.25-2.25H15A2.25 2.25 0 0012.75 9v3"/></svg>
                        </div>
                        <p class="empty-state-text">Esperando nuevas experiencias gastronómicas…</p>
                    </div>
                    <div class="menu-list menu-cards-grid" id="menuList"></div>
                </div>
                <div class="order-summary">
                    <h3>Resumen del pedido</h3>
                    <div class="order-items" id="orderItems">
                        <p class="empty-order">Esperando nuevas experiencias gastronómicas…</p>
                    </div>
                    <textarea id="notaOrdenGeneral" class="nota-orden-general" rows="2" maxlength="200" placeholder="Nota general: alergia a mariscos, es cumpleaños..."></textarea>
                    <div class="order-total">
                        <span>Total:</span>
                        <span id="orderTotal">$0</span>
                    </div>
                    <button type="button" class="btn-send" id="btnSend" disabled>Enviar Orden</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast confirmación -->
    <div class="toast" id="toast">Orden enviada correctamente</div>

    <div id="ticket-container" style="display:none;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase SDKs (Compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="toasts.js"></script>
    <script src="ticket.js"></script>
    <script>
        (function () {
            'use strict';

            var selectedTable = null;
            var order = {};
            var tableButtons = {};
            var menuItems = [];
            var meseroNombre = '';
            var editandoOrdenId = null;
            var editandoPlatillosOriginales = [];
            var estadosAnteriores = {};
            var primeraEjecucionMesero = true;

            // DOM
            var tablesGrid = document.getElementById('tablesGrid');
            var modalOverlay = document.getElementById('modalOverlay');
            var modalTitle = document.getElementById('modalTitle');
            var modalClose = document.getElementById('modalClose');
            var menuList = document.getElementById('menuList');
            var menuModalFilterPills = document.getElementById('menuModalFilterPills');
            var menuListEmptyState = document.getElementById('menuListEmptyState');
            var orderItems = document.getElementById('orderItems');
            var orderTotal = document.getElementById('orderTotal');
            var btnSend = document.getElementById('btnSend');
            var toast = document.getElementById('toast');
            var waiterNameEl = document.getElementById('waiterName');
            var btnLogout = document.getElementById('btnLogout');
            var myOrdersList = document.getElementById('myOrdersList');
            var menuFilterCategoriaMesero = null;

            function slugCategoriaMesero(cat) {
                var s = (cat || 'Otros').toLowerCase().replace(/\s+/g, '-');
                return (s === 'platos-fuertes' || s === 'entradas' || s === 'bebidas' || s === 'postres' || s === 'otros') ? s : 'otros';
            }
            function inicialesProductoMesero(name) {
                if (!name || !String(name).trim()) return '?';
                var parts = String(name).trim().split(/\s+/);
                if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
                return (String(name).trim().substring(0, 2) || '?').toUpperCase();
            }

            // Proteger página: si no hay usuario, ir a login
            auth.onAuthStateChanged(function (user) {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                // 1. Obtener nombre del mesero desde usuarios/{uid}
                db.collection('usuarios').doc(user.uid).get().then(function (doc) {
                    if (doc.exists) {
                        var data = doc.data();
                        meseroNombre = data.nombre || data.displayName || user.displayName || user.email || 'Mesero';
                    } else {
                        meseroNombre = user.displayName || user.email || 'Mesero';
                    }
                    waiterNameEl.textContent = meseroNombre;
                }).catch(function () {
                    meseroNombre = user.displayName || user.email || 'Mesero';
                    waiterNameEl.textContent = meseroNombre;
                });

                db.collection('configuracion').doc('restaurante').get()
                    .then(function (doc) {
                        var nombre = doc.exists && doc.data().nombre ? doc.data().nombre : '';
                        var el = document.getElementById('meseroRestaurantName');
                        if (el && nombre) el.textContent = nombre;
                    });

                // 2. Menú dinámico en tiempo real desde db.collection('menu')
                db.collection('menu').onSnapshot(function (snapshot) {
                    menuItems = [];
                    snapshot.forEach(function (doc) {
                        var d = doc.data();
                        menuItems.push({
                            id: doc.id,
                            name: d.nombre || d.name || 'Sin nombre',
                            price: typeof d.precio !== 'undefined' ? Number(d.precio) : (d.price ? Number(d.price) : 0),
                            categoria: d.categoria || 'Otros',
                            imagen: (d.imagen || d.image || '').trim()
                        });
                    });
                    if (modalOverlay.classList.contains('open')) {
                        renderMenu();
                    }
                });

                // 4. Órdenes del mesero en tiempo real (con filtro de fecha)
                var todasOrdenesmesero = null;
                var filtroFechaInput = document.getElementById('filtroFechaOrdenes');
                var ordenesCountSpan = document.getElementById('ordenesFechaCount');
                if (filtroFechaInput) {
                    var hoy = new Date();
                    var yyyy = hoy.getFullYear();
                    var mm = String(hoy.getMonth() + 1).padStart(2, '0');
                    var dd = String(hoy.getDate()).padStart(2, '0');
                    filtroFechaInput.value = yyyy + '-' + mm + '-' + dd;
                }

                function filtrarYRenderOrdenes() {
                    var fechaStr = filtroFechaInput && filtroFechaInput.value ? filtroFechaInput.value.trim() : '';
                    if (!fechaStr && filtroFechaInput) {
                        var h = new Date();
                        fechaStr = h.getFullYear() + '-' + String(h.getMonth() + 1).padStart(2, '0') + '-' + String(h.getDate()).padStart(2, '0');
                    }
                    var inicio = new Date(fechaStr + 'T00:00:00.000');
                    var fin = new Date(fechaStr + 'T23:59:59.999');
                    var docs = todasOrdenesmesero && todasOrdenesmesero.docs ? todasOrdenesmesero.docs : [];
                    var filtrados = docs.filter(function (doc) {
                        var d = doc.data();
                        var ts = d.timestamp;
                        var fecha = ts && ts.toDate ? ts.toDate() : null;
                        if (fecha === null) return true;
                        return fecha >= inicio && fecha <= fin;
                    });

                    myOrdersList.innerHTML = '';
                    if (filtrados.length === 0) {
                        myOrdersList.innerHTML = '<div class="empty-state"><div class="empty-state-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.87c1.355 0 2.697.055 4.024.165C17.155 8.51 18 9.473 18 10.608v2.513m-3-4.87v-1.5m-6 1.5v-1.5m12 9l-2.25 6a2.25 2.25 0 01-2.25 1.5H6.75a2.25 2.25 0 01-2.25-1.5L2.25 12m18 0v-6a2.25 2.25 0 00-2.25-2.25H6A2.25 2.25 0 003.75 6v6m18 0V9a2.25 2.25 0 00-2.25-2.25H15A2.25 2.25 0 0012.75 9v3"/></svg></div><p class="empty-state-text">Esperando nuevas experiencias gastronómicas…</p></div>';
                        if (ordenesCountSpan) ordenesCountSpan.textContent = '0 orden(es) encontrada(s)';
                        return;
                    }
                    if (ordenesCountSpan) ordenesCountSpan.textContent = filtrados.length + ' orden(es) encontrada(s)';

                    filtrados.forEach(function (doc) {
                        var o = doc.data();
                        var platillosArray = Array.isArray(o.platillos) ? o.platillos : [];
                        var estado = (o.estado || 'pendiente').toLowerCase().replace(/\s/g, '-');
                        var estadoClass = 'estado-pendiente';
                        if (estado === 'en-preparacion' || estado === 'preparacion') estadoClass = 'estado-preparacion';
                        else if (estado === 'listo' || estado === 'servido') estadoClass = 'estado-listo';
                        else if (estado === 'entregado') estadoClass = 'estado-entregado';
                        var esPagada = (o.estado || '').toLowerCase() === 'pagada';
                        var puedeCambiarQty = !esPagada && (estado === 'pendiente' || estado === 'en-preparacion' || estado === 'preparacion');
                        var puedeEliminar = !esPagada && estado === 'pendiente';

                        var platillosHtml = '';
                        platillosArray.forEach(function (p, idx) {
                            var cant = p.cantidad || 1;
                            var precio = p.precio || 0;
                            var subtotal = precio * cant;
                            var nombre = p.nombre || '';
                            var nota = (p && p.nota) ? String(p.nota).trim() : '';

                            // Línea 1: nombre + cantidad
                            var linea2Html = '<span class="orden-platillo-precio">$' + precio + '</span>' +
                                '<span class="orden-platillo-precio">$' + subtotal.toFixed(2) + '</span>';
                            if (puedeCambiarQty) {
                                linea2Html += '<button type="button" class="btn-qty btn-qty-mas" data-index="' + idx + '" aria-label="Aumentar">+</button>' +
                                    '<button type="button" class="btn-qty btn-qty-menos" data-index="' + idx + '" aria-label="Disminuir">−</button>';
                            }
                            if (puedeEliminar) {
                                linea2Html += '<button type="button" class="btn-eliminar-platillo" data-index="' + idx + '" data-nombre="' + nombre.replace(/"/g, '&quot;') + '" aria-label="Eliminar">✕</button>';
                            }
                            platillosHtml += '<div class="orden-platillo-fila" data-index="' + idx + '">' +
                                '<div class="orden-platillo-linea1">' +
                                    '<span class="orden-platillo-nombre">' + nombre + '</span>' +
                                    '<span class="orden-platillo-qty">[' + cant + 'x]</span>' +
                                '</div>' +
                                '<div class="orden-platillo-linea2">' + linea2Html + '</div>' +
                                '</div>';

                            // Nota en línea propia debajo (si existe)
                            if (nota) {
                                var notaEsc = nota
                                    .replace(/&/g, '&amp;')
                                    .replace(/</g, '&lt;')
                                    .replace(/>/g, '&gt;')
                                    .replace(/"/g, '&quot;')
                                    .replace(/'/g, '&#39;');
                                platillosHtml += '<div class="nota-platillo-row" style="padding-left:8px; font-size:12px; font-style:italic; opacity:0.8; margin-bottom:4px; color:#a0aec0;">→ ' + notaEsc + '</div>';
                            }
                        });
                        if (!platillosHtml) platillosHtml = '<div class="orden-platillo-fila"><span class="orden-platillo-nombre">—</span></div>';

                        var notaOrdenText = (o.notaOrden && String(o.notaOrden).trim()) || '';
                        if (notaOrdenText) {
                            var notaOrdenEsc = notaOrdenText
                                .replace(/&/g, '&amp;')
                                .replace(/</g, '&lt;')
                                .replace(/>/g, '&gt;')
                                .replace(/"/g, '&quot;')
                                .replace(/'/g, '&#39;');
                            platillosHtml += '<div class="nota-orden-display"><span class="nota-orden-label">Nota general:</span> ' + notaOrdenEsc + '</div>';
                        }

                        var botonesAcciones = '';
                        if (!esPagada) {
                            botonesAcciones += '<button type="button" class="btn-agregar-mas" title="Agregar platillo">＋ Agregar platillo</button>';
                        }
                        botonesAcciones += '<button type="button" class="btn-whatsapp-mesero" title="Enviar por WhatsApp">WhatsApp</button>';
                        /*botonesAcciones += '<button type="button" class="btn-print-mesero" title="Imprimir ticket">Imprimir</button>';*/

                        var card = document.createElement('div');
                        card.className = 'order-card';
                        card.setAttribute('data-orden-id', doc.id);
                        card.innerHTML = '<div class="order-card-header">' +
                            '<span class="order-card-mesa">Mesa ' + (o.mesa || '—') + '</span>' +
                            '<span class="order-card-estado ' + estadoClass + '">' + (o.estado || 'pendiente') + '</span></div>' +
                            '<div class="order-card-platillos">' + platillosHtml + '</div>' +
                            '<div class="order-card-total"><span>Total: $' + (typeof o.total === 'number' ? o.total.toFixed(2) : '0.00') + '</span>' + botonesAcciones + '</div>';
                        myOrdersList.appendChild(card);

                        card.querySelector('.btn-whatsapp-mesero').addEventListener('click', function () {
                            if (typeof window.enviarWhatsApp === 'function') {
                                window.enviarWhatsApp(card.getAttribute('data-orden-id'));
                            }
                        });
                        var btnPrintMesero = card.querySelector('.btn-print-mesero');
                        if (btnPrintMesero) {
                            btnPrintMesero.addEventListener('click', function () {
                                if (typeof window.prepararTicket === 'function') {
                                    window.prepararTicket(card.getAttribute('data-orden-id'));
                                }
                            });
                        }

                        var btnAgregarMas = card.querySelector('.btn-agregar-mas');
                        if (btnAgregarMas) {
                            btnAgregarMas.addEventListener('click', function () {
                                var platillosActuales = platillosArray.slice();
                                var mesaNum = o.mesa || '?';
                                openModalEdicion(doc.id, mesaNum, platillosActuales);
                            });
                        }

                        card.querySelectorAll('.btn-qty-mas').forEach(function (btn) {
                            btn.addEventListener('click', function () {
                                var idx = parseInt(this.getAttribute('data-index'), 10);
                                var arr = platillosArray.slice();
                                if (idx < 0 || idx >= arr.length) return;
                                arr[idx] = {
                                    nombre: arr[idx].nombre,
                                    precio: arr[idx].precio || 0,
                                    cantidad: (arr[idx].cantidad || 1) + 1
                                };
                                var total = 0;
                                arr.forEach(function (p) { total += (p.precio || 0) * (p.cantidad || 1); });
                                db.collection('ordenes').doc(doc.id).update({ platillos: arr, total: total }).catch(function (err) {
                                    console.error('Error al actualizar:', err);
                                    if (typeof window.showToast === 'function') window.showToast('No se pudo actualizar la orden.', 'error');
                                    else alert('No se pudo actualizar la orden.');
                                });
                            });
                        });

                        card.querySelectorAll('.btn-qty-menos').forEach(function (btn) {
                            btn.addEventListener('click', function () {
                                var idx = parseInt(this.getAttribute('data-index'), 10);
                                var arr = platillosArray.slice();
                                if (idx < 0 || idx >= arr.length) return;
                                var cant = (arr[idx].cantidad || 1) - 1;
                                if (cant < 1) return;
                                arr[idx] = {
                                    nombre: arr[idx].nombre,
                                    precio: arr[idx].precio || 0,
                                    cantidad: cant
                                };
                                var total = 0;
                                arr.forEach(function (p) { total += (p.precio || 0) * (p.cantidad || 1); });
                                db.collection('ordenes').doc(doc.id).update({ platillos: arr, total: total }).catch(function (err) {
                                    console.error('Error al actualizar:', err);
                                    if (typeof window.showToast === 'function') window.showToast('No se pudo actualizar la orden.', 'error');
                                    else alert('No se pudo actualizar la orden.');
                                });
                            });
                        });

                        card.querySelectorAll('.btn-eliminar-platillo').forEach(function (btn) {
                            btn.addEventListener('click', function () {
                                var idx = parseInt(this.getAttribute('data-index'), 10);
                                var nombre = this.getAttribute('data-nombre') || 'este platillo';
                                if (!confirm('¿Eliminar ' + nombre + ' de la orden?')) return;
                                var arr = platillosArray.slice();
                                if (idx < 0 || idx >= arr.length) return;
                                arr.splice(idx, 1);
                                var total = 0;
                                arr.forEach(function (p) { total += (p.precio || 0) * (p.cantidad || 1); });
                                db.collection('ordenes').doc(doc.id).update({ platillos: arr, total: total }).catch(function (err) {
                                    console.error('Error al actualizar:', err);
                                    if (typeof window.showToast === 'function') window.showToast('No se pudo actualizar la orden.', 'error');
                                    else alert('No se pudo actualizar la orden.');
                                });
                            });
                        });
                    });
                }

                if (filtroFechaInput) {
                    filtroFechaInput.addEventListener('change', filtrarYRenderOrdenes);
                }

                db.collection('ordenes').where('meseroId', '==', user.uid).onSnapshot(function (snapshot) {
                    todasOrdenesmesero = snapshot;
                    filtrarYRenderOrdenes();
                });

                var lastOrdenesSnapshot = null;
                function actualizarGridMesas() {
                    if (!lastOrdenesSnapshot) return;
                    var docs = lastOrdenesSnapshot.docs || [];
                    var mesasPorEstado = {};
                    docs.forEach(function (doc) {
                        var o = doc.data();
                        var estado = (o.estado || '').toLowerCase();
                        if (estado !== 'pagada' && estado !== 'cancelada') {
                            var mesa = o.mesa;
                            var meseroId = o.meseroId || '';
                            if (mesa != null && mesa !== '') {
                                mesasPorEstado[mesa] = { meseroId: meseroId };
                            }
                        }
                    });
                    var currentUid = auth.currentUser ? auth.currentUser.uid : '';
                    for (var k in tableButtons) {
                        var btn = tableButtons[k];
                        btn.classList.remove('mesa-propia', 'mesa-ocupada-otro');
                        btn.removeAttribute('title');
                    }
                    for (var mesa in mesasPorEstado) {
                        var info = mesasPorEstado[mesa];
                        var btn = tableButtons[mesa];
                        if (!btn) continue;
                        if (info.meseroId === currentUid) {
                            btn.classList.add('mesa-propia');
                        } else {
                            btn.classList.add('mesa-ocupada-otro');
                            btn.setAttribute('title', 'Ocupada por otro mesero');
                        }
                    }
                }

                db.collection('ordenes').onSnapshot(function (snapshot) {
                    lastOrdenesSnapshot = snapshot;

                    var currentUid = auth.currentUser ? auth.currentUser.uid : '';
                    if (!primeraEjecucionMesero) {
                        snapshot.forEach(function (doc) {
                            var datos = doc.data();
                            var estadoActual = datos.estado || '';
                            if (
                                estadosAnteriores[doc.id] &&
                                estadosAnteriores[doc.id] !== 'listo' &&
                                estadoActual === 'listo' &&
                                datos.meseroId === currentUid
                            ) {
                                notificarOrdenLista(datos.mesa, doc.id);
                            }
                        });
                    }

                    snapshot.forEach(function (doc) {
                        estadosAnteriores[doc.id] = doc.data().estado || '';
                    });

                    if (primeraEjecucionMesero) {
                        primeraEjecucionMesero = false;
                    }

                    actualizarGridMesas();
                });
            });

            // 5. Cerrar sesión
            btnLogout.addEventListener('click', function () {
                auth.signOut().then(function () {
                    window.location.href = 'login.html';
                });
            });

            // Cargar mesas desde configuración en Firestore en tiempo real (onSnapshot)
            function cargarMesas() {
                db.collection('configuracion').doc('mesas').onSnapshot(function (doc) {
                    tablesGrid.innerHTML = '';
                    for (var k in tableButtons) delete tableButtons[k];
                    var numeros = [];
                    if (doc.exists && doc.data().numeros && Array.isArray(doc.data().numeros) && doc.data().numeros.length > 0) {
                        numeros = doc.data().numeros;
                    } else {
                        for (var i = 1; i <= 50; i++) numeros.push(i);
                    }
                    numeros.forEach(function (numero) {
                        var btn = document.createElement('button');
                        btn.className = 'table-btn';
                        btn.textContent = 'Mesa ' + numero;
                        btn.setAttribute('data-table', numero);
                        btn.addEventListener('click', function () {
                            openModal(parseInt(this.getAttribute('data-table'), 10));
                        });
                        tablesGrid.appendChild(btn);
                        tableButtons[numero] = btn;
                    });
                    if (typeof actualizarGridMesas === 'function') actualizarGridMesas();
                }, function (err) {
                    console.error('Error cargando configuración de mesas:', err);
                    tablesGrid.innerHTML = '';
                    for (var k in tableButtons) delete tableButtons[k];
                    var numeros = [];
                    for (var d = 1; d <= 50; d++) numeros.push(d);
                    numeros.forEach(function (numero) {
                        var btn = document.createElement('button');
                        btn.className = 'table-btn';
                        btn.textContent = 'Mesa ' + numero;
                        btn.setAttribute('data-table', numero);
                        btn.addEventListener('click', function () {
                            openModal(parseInt(this.getAttribute('data-table'), 10));
                        });
                        tablesGrid.appendChild(btn);
                        tableButtons[numero] = btn;
                    });
                    if (typeof actualizarGridMesas === 'function') actualizarGridMesas();
                });
            }
            cargarMesas();

            // Renderizar menú (desde menuItems): pills + cards con imagen/placeholder y precio oro
            function renderMenu() {
                var ordenCategorias = ['Entradas', 'Platos fuertes', 'Bebidas', 'Postres', 'Otros'];
                var byCat = {};
                menuItems.forEach(function (item) {
                    var c = item.categoria || 'Otros';
                    if (!byCat[c]) byCat[c] = [];
                    byCat[c].push(item);
                });

                if (!menuModalFilterPills || !menuList || !menuListEmptyState) return;

                // Pills
                menuModalFilterPills.innerHTML = '';
                var pillTodos = document.createElement('button');
                pillTodos.type = 'button';
                pillTodos.className = 'menu-filter-pill' + (menuFilterCategoriaMesero === null ? ' active' : '');
                pillTodos.textContent = 'Todos';
                pillTodos.setAttribute('data-categoria', '');
                pillTodos.addEventListener('click', function () {
                    menuFilterCategoriaMesero = null;
                    menuModalFilterPills.querySelectorAll('.menu-filter-pill').forEach(function (p) {
                        var c = p.getAttribute('data-categoria');
                        p.classList.toggle('active', (c === '' && menuFilterCategoriaMesero === null) || (c === menuFilterCategoriaMesero));
                    });
                    renderMenu();
                });
                menuModalFilterPills.appendChild(pillTodos);
                ordenCategorias.forEach(function (cat) {
                    var pill = document.createElement('button');
                    pill.type = 'button';
                    pill.className = 'menu-filter-pill' + (menuFilterCategoriaMesero === cat ? ' active' : '');
                    pill.textContent = cat;
                    pill.setAttribute('data-categoria', cat);
                    pill.addEventListener('click', function () {
                        menuFilterCategoriaMesero = cat;
                        menuModalFilterPills.querySelectorAll('.menu-filter-pill').forEach(function (p) {
                            var c = p.getAttribute('data-categoria');
                            p.classList.toggle('active', (c === '' && menuFilterCategoriaMesero === null) || (c === menuFilterCategoriaMesero));
                        });
                        renderMenu();
                    });
                    menuModalFilterPills.appendChild(pill);
                });

                var filtrados = menuFilterCategoriaMesero
                    ? (byCat[menuFilterCategoriaMesero] || [])
                    : menuItems;

                if (filtrados.length === 0) {
                    menuList.style.display = 'none';
                    menuListEmptyState.style.display = 'block';
                    var emptyMsg = menuListEmptyState.querySelector('.empty-state-text');
                    if (emptyMsg) {
                        emptyMsg.textContent = menuItems.length === 0
                            ? 'Esperando nuevas experiencias gastronómicas…'
                            : 'Ningún platillo en esta categoría.';
                    }
                    return;
                }
                menuListEmptyState.style.display = 'none';
                menuList.style.display = 'grid';
                menuList.innerHTML = '';

                filtrados.forEach(function (item) {
                    var slug = slugCategoriaMesero(item.categoria);
                    var iniciales = inicialesProductoMesero(item.name);
                    var imgUrl = (item.imagen || '').trim();
                    var card = document.createElement('div');
                    card.className = 'product-card';

                    var topWrap = document.createElement('div');
                    topWrap.className = 'product-card-image-wrap';
                    if (imgUrl) {
                        var img = document.createElement('img');
                        img.className = 'product-card-image';
                        img.src = imgUrl;
                        img.alt = item.name;
                        img.loading = 'lazy';
                        img.onerror = function () {
                            var ph = document.createElement('div');
                            ph.className = 'product-card-placeholder';
                            ph.setAttribute('data-cat', slug);
                            ph.textContent = iniciales;
                            topWrap.innerHTML = '';
                            topWrap.appendChild(ph);
                        };
                        topWrap.appendChild(img);
                    } else {
                        var ph = document.createElement('div');
                        ph.className = 'product-card-placeholder';
                        ph.setAttribute('data-cat', slug);
                        ph.textContent = iniciales;
                        topWrap.appendChild(ph);
                    }
                    card.appendChild(topWrap);

                    var body = document.createElement('div');
                    body.className = 'product-card-body';
                    body.innerHTML = '<span class="product-card-name">' + (item.name || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>' +
                        '<span class="product-card-meta">' + (item.categoria || 'Otros') + '</span>';
                    var footer = document.createElement('div');
                    footer.className = 'product-card-footer';
                    var precioStr = (item.price != null) ? Number(item.price).toFixed(2) : '0.00';
                    footer.innerHTML = '<button type="button" class="btn-add" data-id="' + (item.id || '') + '" data-name="' + (item.name || '').replace(/"/g, '&quot;') + '" data-price="' + (item.price != null ? item.price : 0) + '">+</button>' +
                        '<span class="product-card-price">$' + precioStr + '</span>';
                    body.appendChild(footer);
                    card.appendChild(body);

                    menuList.appendChild(card);
                });

                menuList.querySelectorAll('.btn-add').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        addItem(this.getAttribute('data-id'), this.getAttribute('data-name'), parseInt(this.getAttribute('data-price'), 10));
                    });
                });
            }

            function addItem(id, name, price) {
                if (!order[id]) {
                    order[id] = { name: name, price: price, qty: 0 };
                }
                order[id].qty++;
                updateOrderSummary();
                // Toast de confirmación
                var ta = document.getElementById('toastAdd');
                if (ta) {
                    ta.textContent = '+ ' + name + '  ×' + order[id].qty;
                    ta.classList.add('show');
                    clearTimeout(ta._timer);
                    ta._timer = setTimeout(function() {
                        ta.classList.remove('show');
                    }, 1500);
                }
            }

            function updateOrderSummary() {
                var total = 0;
                var html = '';
                for (var id in order) {
                    if (order[id].qty > 0) {
                        if (typeof order[id].nota !== 'string') {
                            order[id].nota = '';
                        }
                        var subtotal = order[id].price * order[id].qty;
                        total += subtotal;
                        var notaValue = order[id].nota || '';
                        var notaAttr = notaValue
                            .replace(/&/g, '&amp;')
                            .replace(/"/g, '&quot;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;');
                        html += '<div class="order-item">' +
                            '<span><span class="order-item-qty">' + order[id].qty + 'x</span> ' + order[id].name + '</span>' +
                            '<input type="text" class="nota-platillo-input" data-id="' + id + '" placeholder="Nota: sin cebolla, término medio..." maxlength="100" value="' + notaAttr + '">' +
                            '<span>$' + subtotal + '</span></div>';
                    }
                }
                if (html) {
                    orderItems.innerHTML = html;
                    var notaInputs = orderItems.querySelectorAll('.nota-platillo-input');
                    notaInputs.forEach(function (input) {
                        var platilloId = input.getAttribute('data-id');
                        input.addEventListener('input', function () {
                            if (order[platilloId]) {
                                order[platilloId].nota = this.value;
                            }
                        });
                    });
                    btnSend.disabled = false;
                } else {
                    orderItems.innerHTML = '<p class="empty-order">Esperando nuevas experiencias gastronómicas…</p>';
                    btnSend.disabled = true;
                }
                orderTotal.textContent = '$' + total;
            }

            function openModal(tableNum) {
                selectedTable = tableNum;
                order = {};
                modalTitle.textContent = 'Mesa ' + tableNum;
                renderMenu();
                updateOrderSummary();
                modalOverlay.classList.add('open');
                if (tableButtons[tableNum]) {
                    var btn = tableButtons[tableNum];
                    btn.classList.add('selected');
                    btn.classList.remove('mesa-lista');
                    var badge = btn.querySelector('.mesa-lista-badge');
                    if (badge) badge.parentNode.removeChild(badge);
                }
            }

            function openModalEdicion(ordenId, mesaNum, platillosActuales) {
                editandoOrdenId = ordenId;
                editandoPlatillosOriginales = platillosActuales || [];
                selectedTable = mesaNum;
                order = {};
                modalTitle.textContent = 'Agregar a Mesa ' + mesaNum;
                btnSend.textContent = 'Agregar platillos';
                renderMenu();
                updateOrderSummary();
                modalOverlay.classList.add('open');
            }

            function closeModal() {
                modalOverlay.classList.remove('open');
                if (selectedTable && tableButtons[selectedTable]) {
                    tableButtons[selectedTable].classList.remove('selected');
                }
                selectedTable = null;
                order = {};
                var notaGeneral = document.getElementById('notaOrdenGeneral');
                if (notaGeneral) notaGeneral.value = '';
                editandoOrdenId = null;
                editandoPlatillosOriginales = [];
                btnSend.textContent = 'Enviar Orden';
                btnSend.disabled = true;
            }

            function showToast() {
                toast.classList.add('show');
                setTimeout(function () {
                    toast.classList.remove('show');
                }, 2500);
            }

            // 3. Enviar orden a db.collection('ordenes')
            function sendOrder() {
                if (Object.keys(order).length === 0) return;
                var user = auth.currentUser;
                if (!user) return;

                var notaOrdenTexto = '';
                var notaOrdenEl = document.getElementById('notaOrdenGeneral');
                if (notaOrdenEl) notaOrdenTexto = notaOrdenEl.value.trim();

                // Construir array de platillos nuevos seleccionados
                var platillosNuevos = [];
                var totalNuevo = 0;
                for (var id in order) {
                    if (order[id].qty > 0) {
                        platillosNuevos.push({
                            nombre: order[id].name,
                            precio: order[id].price,
                            cantidad: order[id].qty,
                            nota: order[id].nota || ''
                        });
                        totalNuevo += order[id].price * order[id].qty;
                    }
                }

                // MODO EDICIÓN: fusionar con platillos existentes y hacer update
                if (editandoOrdenId) {
                    var fusionados = editandoPlatillosOriginales.slice();
                    platillosNuevos.forEach(function(nuevo) {
                        var encontrado = false;
                        for (var i = 0; i < fusionados.length; i++) {
                            if (fusionados[i].nombre === nuevo.nombre) {
                                fusionados[i] = {
                                    nombre: fusionados[i].nombre,
                                    precio: fusionados[i].precio,
                                    cantidad: (fusionados[i].cantidad || 1) + nuevo.cantidad,
                                    nota: (fusionados[i].nota || nuevo.nota || '')
                                };
                                encontrado = true;
                                break;
                            }
                        }
                        if (!encontrado) {
                            fusionados.push({
                                nombre: nuevo.nombre,
                                precio: nuevo.precio,
                                cantidad: nuevo.cantidad,
                                nota: nuevo.nota || ''
                            });
                        }
                    });

                    // Recalcular total completo
                    var totalFinal = 0;
                    fusionados.forEach(function(p) {
                        totalFinal += (p.precio || 0) * (p.cantidad || 1);
                    });

                    db.collection('ordenes').doc(editandoOrdenId).update({
                        platillos: fusionados,
                        total: totalFinal,
                        notaOrden: notaOrdenTexto
                    }).then(function() {
                        var toastEl = document.getElementById('toast');
                        toastEl.textContent = 'Platillos agregados correctamente';
                        toastEl.classList.add('show');
                        setTimeout(function() {
                            toastEl.classList.remove('show');
                            toastEl.textContent = 'Orden enviada correctamente';
                        }, 2500);
                        closeModal();
                    }).catch(function(err) {
                        console.error('Error al actualizar orden:', err);
                        if (typeof window.showToast === 'function') window.showToast('No se pudo actualizar la orden.', 'error');
                        else alert('No se pudo actualizar la orden.');
                    });
                    return;
                }

                // MODO NUEVA ORDEN: flujo original
                if (!selectedTable) return;
                db.collection('ordenes').add({
                    mesa: String(selectedTable),
                    platillos: platillosNuevos,
                    total: totalNuevo,
                    estado: 'pendiente',
                    meseroId: user.uid,
                    meseroNombre: meseroNombre || user.displayName || user.email || 'Mesero',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    notaOrden: notaOrdenTexto
                }).then(function() {
                    var toastEl = document.getElementById('toast');
                    toastEl.classList.add('show');
                    setTimeout(function() { toastEl.classList.remove('show'); }, 2500);
                    closeModal();
                }).catch(function(err) {
                    console.error('Error al guardar orden:', err);
                });
            }

            function notificarOrdenLista(mesa, ordenId) {
                // 1. Sonido: doble pitido con Web Audio API
                try {
                    var ctx = new (window.AudioContext || window.webkitAudioContext)();
                    function pitido(freq, inicio, duracion) {
                        var osc = ctx.createOscillator();
                        var gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.3, ctx.currentTime + inicio);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + inicio + duracion);
                        osc.start(ctx.currentTime + inicio);
                        osc.stop(ctx.currentTime + inicio + duracion);
                    }
                    pitido(1000, 0, 0.15);
                    pitido(1200, 0.25, 0.2);
                } catch (e) { /* silencio si Web Audio no está disponible */ }

                // 2. Toast
                var msg = '✅ Mesa ' + mesa + ' — ¡Orden lista para servir!';
                if (typeof window.showToast === 'function') {
                    window.showToast(msg, 'success');
                } else {
                    var div = document.createElement('div');
                    div.textContent = msg;
                    div.style.cssText = 'position:fixed;top:20px;right:20px;background:#065f46;color:#fff;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
                    document.body.appendChild(div);
                    setTimeout(function () {
                        if (div.parentNode) div.parentNode.removeChild(div);
                    }, 5000);
                }

                // 3. Badge en el botón de mesa
                var btn = tableButtons[String(mesa)];
                if (!btn) {
                    // Intentar con número
                    btn = tableButtons[parseInt(mesa, 10)];
                }
                if (btn) {
                    btn.classList.add('mesa-lista');
                    if (!btn.querySelector('.mesa-lista-badge')) {
                        var badge = document.createElement('span');
                        badge.className = 'mesa-lista-badge';
                        badge.textContent = '✓';
                        btn.appendChild(badge);
                    }
                }
            }

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function (e) {
                if (e.target === modalOverlay) closeModal();
            });
            btnSend.addEventListener('click', sendOrder);
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function (err) { console.warn('SW no registrado:', err); });
        }
    </script>
<div class="toast-add" id="toastAdd"></div>
</body>
